<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario: Gravity Chaos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- HUD Superior -->
        <div id="hud">
            <div class="hud-item portrait-hud">
                <canvas id="mario-portrait" width="40" height="40"></canvas>
                <div class="hud-text">
                    <span class="label">MARIO</span><br>
                    <span id="score">000000</span>
                </div>
            </div>
            <div class="hud-item">
                <span class="label">COINS</span><br>
                <span>x<span id="coin-count">00</span></span>
            </div>
            <div class="hud-item">
                <span class="label">GRAVITY</span><br>
                <span id="gravity-status">NORMAL</span>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <!-- Overlays -->
        <div id="overlay">
            <div id="start-screen" class="screen">
                <h1>SUPER MARIO</h1>
                <p>GRAVITY CHAOS</p>
                <div id="mario-mascot-container">
                    <canvas id="mario-mascot" width="100" height="120"></canvas>
                </div>
                <button id="start-btn" class="pixel-btn">START GAME</button>
                <div class="controls-hint">
                    ARROWS/WASD: Move & Jump<br>
                    SHIFT/F: Shoot (Fire Mario)<br>
                    SPACE: Gravity Chaos (Special)
                </div>
            </div>

            <div id="game-over-screen" class="screen hidden">
                <h1>GAME OVER</h1>
                <p>Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="pixel-btn">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        // Force refresh script to avoid caching issues with new character designs
        const script = document.createElement('script');
        script.src = 'src/game.js?v=' + Date.now();
        document.body.appendChild(script);
    </script>
</body>

</html>
